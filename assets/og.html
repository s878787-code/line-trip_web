<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Sora:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    position:relative;background:#0A0E12;color:#F2F6F8;
    font-family:'Noto Sans TC','Sora',sans-serif;
    background-image:
      radial-gradient(620px 440px at 88% -10%,rgba(6,182,212,.28),transparent 60%),
      radial-gradient(560px 520px at 4% 6%,rgba(45,212,191,.20),transparent 62%),
      radial-gradient(700px 500px at 60% 120%,rgba(6,199,85,.08),transparent 60%);
  }
  .grid{position:absolute;inset:0;opacity:.06;
    background-image:linear-gradient(rgba(255,255,255,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.6) 1px,transparent 1px);
    background-size:48px 48px;mask-image:radial-gradient(circle at 70% 40%,#000,transparent 75%)}
  .pad{position:absolute;inset:0;padding:66px 72px;display:flex;flex-direction:column;justify-content:space-between}

  .brand{display:flex;align-items:center;gap:16px}
  .mark{filter:drop-shadow(0 0 14px rgba(45,212,191,.5))}
  .brand .wm{font-family:'Sora',sans-serif;font-weight:800;font-size:34px;letter-spacing:-.5px}
  .brand .wm .t{color:#2DD4BF}
  .brand .sub{font-size:16px;color:#93A4B0;letter-spacing:4px;margin-top:2px}

  .eyebrow{display:inline-flex;align-items:center;gap:10px;align-self:flex-start;
    font-size:19px;font-weight:700;color:#2DD4BF;letter-spacing:3px;
    background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.32);
    padding:9px 20px;border-radius:999px;margin-bottom:24px}
  .eyebrow i{width:9px;height:9px;border-radius:50%;background:#2DD4BF;box-shadow:0 0 12px #2DD4BF;display:block}
  h1{font-family:'Sora','Noto Sans TC',sans-serif;font-weight:900;font-size:74px;line-height:1.14;letter-spacing:-1px}
  h1 .g{background:linear-gradient(100deg,#5EEAD4,#2DD4BF 45%,#06B6D4);-webkit-background-clip:text;background-clip:text;color:transparent}
  .desc{margin-top:26px;font-size:26px;color:#AEBcC6;color:#AEBEC8;font-weight:500}

  .foot{display:flex;align-items:center;justify-content:space-between}
  .chips{display:flex;gap:12px}
  .chip{font-size:20px;font-weight:700;color:#CBD5Dc;color:#CBD5DC;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);padding:10px 20px;border-radius:12px}
  .chip.hot{color:#2DD4BF;border-color:rgba(45,212,191,.35);background:rgba(45,212,191,.1)}
  .url{font-size:20px;color:#6B7E8B;font-family:'Sora',sans-serif;font-weight:700}

  .radar{position:absolute;right:-90px;top:190px;width:560px;height:560px;opacity:.9}
</style>
</head>
<body>
  <!-- 大型雷達背景 -->
  <svg class="radar" viewBox="0 0 560 560" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5EEAD4"/><stop offset="1" stop-color="#06B6D4"/></linearGradient>
      <radialGradient id="rs" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#2DD4BF" stop-opacity="0.42"/><stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/></radialGradient>
    </defs>
    <g transform="translate(280,280)">
      <path d="M0 0 L235 -118 A263 263 0 0 1 250 70 Z" fill="url(#rs)"/>
      <circle r="262" stroke="url(#rg)" stroke-width="3" opacity="0.9"/>
      <circle r="196" stroke="#2DD4BF" stroke-width="1.6" opacity="0.32"/>
      <circle r="130" stroke="#2DD4BF" stroke-width="1.6" opacity="0.24"/>
      <circle r="64" stroke="#2DD4BF" stroke-width="1.6" opacity="0.18"/>
      <path d="M0 0 L246 -123" stroke="url(#rg)" stroke-width="3.4" stroke-linecap="round"/>
      <circle r="6" fill="#2DD4BF"/>
      <circle cx="96" cy="104" r="10" fill="#06C755"/>
      <circle cx="-120" cy="70" r="6" fill="#2DD4BF" opacity="0.7"/>
      <circle cx="150" cy="-40" r="5" fill="#2DD4BF" opacity="0.6"/>
    </g>
  </svg>
  <div class="grid"></div>

  <div class="pad">
    <div class="brand">
      <svg class="mark" width="60" height="60" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="mg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5EEAD4"/><stop offset="0.5" stop-color="#2DD4BF"/><stop offset="1" stop-color="#06B6D4"/></linearGradient></defs>
        <g transform="translate(32,32)">
          <circle r="27" stroke="url(#mg)" stroke-width="2.6"/>
          <circle r="16" stroke="#2DD4BF" stroke-width="1.3" opacity="0.4"/>
          <path d="M0 0 L26 -13" stroke="url(#mg)" stroke-width="2.8" stroke-linecap="round"/>
          <circle r="2.8" fill="#2DD4BF"/>
          <circle cx="10" cy="11" r="3.6" fill="#06C755"/>
        </g>
      </svg>
      <div>
        <div class="wm">Trip<span class="t">Radar</span></div>
        <div class="sub">車趟輔助</div>
      </div>
    </div>

    <div>
      <span class="eyebrow"><i></i>職業司機的 AI 接單助手</span>
      <h1>不用一直刷 LINE，<br>車趟<span class="g">直接送到你眼前</span>。</h1>
      <div class="desc">自動辨識 LINE 群組派單・整理上下車與距離 ETA・一鍵回覆</div>
    </div>

    <div class="foot">
      <div class="chips">
        <span class="chip hot">前 100 名創始會員</span>
        <span class="chip">一天約 NT$20</span>
        <span class="chip">LINE @493watvi</span>
      </div>
      <div class="url">s878787-code.github.io/line-trip_web</div>
    </div>
  </div>
</body>
</html>
